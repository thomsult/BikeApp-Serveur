services:
  bikeapp-db:
    image: mysql:latest
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: bike_app
      MYSQL_USER: bikeappuser
      MYSQL_PASSWORD: bikeapppassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - backend
    
  vite:
    image: node:latest
    platform: linux/amd64
    volumes:
      - .:/app
    working_dir: /app
    command: npm run dev -- --host
    networks:
      - backend
    labels:
     - dev.orbstack.domains=vite.bikeapp.local
  bikeapp-php:
    image: bikeapp-php:latest
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
    restart: always
    volumes:
      - .:/app
    labels:
    - dev.orbstack.domains=api.bikeapp.local
    networks:
      - backend
  bikeapp-mailpit:
    image: axllent/mailpit:latest
    restart: always
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI
    
    networks:
      - backend

  bikeapp-frontend:
    platform: linux/amd64
    image: node:20
    working_dir: /app
    volumes:
      - ./frontend_dev:/app
    command: >
      sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    env_file:
      - ./frontend_dev/.env.local
    
    restart: always
   

# Volumes nécessaires pour les certificats et la configuration de Caddy
volumes:
  caddy_data:
  caddy_config:
  db_data:

networks:
  backend:
    driver: bridge
