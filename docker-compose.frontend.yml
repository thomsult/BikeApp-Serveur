services:
  bikeapp-frontend:
    platform: linux/amd64
    image: node:20
    working_dir: /app
    volumes:
      - ./frontend_dev:/app
    command: >
      sh -c "npm install && npm run dev -- --host"
    env_file:
      - ./frontend_dev/.env.local
    restart: always
    labels:
      - dev.orbstack.domains=frontend.bikeapp.local